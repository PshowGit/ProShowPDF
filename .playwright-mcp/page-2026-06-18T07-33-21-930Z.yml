                      - generic [ref=e605]: Vorrei condividere le mie esperienze con il teleobiettivo 28X per telefoni cellulari. Lo uso con il mio Xiaomi Mi 13t Pro e funziona benissimo. Funziona senza intoppi e cattura dettagli complessi in modo preciso e chiaro. Tuttavia, ci vuole un po’ di tempo e di pratica per padroneggiare questa funzione. Ma una volta capito, i risultati valgono la pena. Altamente raccomandato per chiunque lo desideri.
