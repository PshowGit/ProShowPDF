                      - generic [ref=e1395]:
                        - heading "Boomerang" [level=1] [ref=e1396]
                        - paragraph [ref=e1397]: DJI Mini 4K si sposta attorno al soggetto seguendo un percorso ovale, ascendendo mentre si allontana e discendendo mentre ritorna indietro. Il pilota seleziona un soggetto e la fotocamera effettua una breve ripresa, mettendo in evidenza in modo dinamico l'importanza del soggetto e concentrando quindi l'attenzione su quest'ultimo.
                      - generic [ref=e1405]:
                        - generic "Fai clic per riprodurre il video, Riprese aeree di un drone che mostrano una struttura circolare in cemento costruita su una scogliera rocciosa che si affaccia sul mare. La struttura è collegata alla terraferma da un ponte pedonale. Il video inizia con una vista ravvicinata della struttura e si allontana gradualmente, rivelando l&#39;ampio panorama dell&#39;oceano e della costa rocciosa. La luce del sole si riflette sull&#39;acqua, creando un effetto scintillante sulla superficie del mare. Il video evidenzia le capacità di ripresa aerea e la qualità dell&#39;immagine del drone."
