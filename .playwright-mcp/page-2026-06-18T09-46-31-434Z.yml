            - listitem [ref=e782]: Ideale per i principianti, sicuro - DJI Mini 4K supporta decollo e atterraggio a un tocco, Return to Home (RTH) GPS e stazionamento ultra stabile, azionamento semplice one-touch Ulteriori risorse di apprendimento in-app, per padroneggiare subito il volo.
