          - list [ref=e777]:
            - listitem [ref=e778]: Peso inferiore a 249 g, Certificazione Classe C0 - Essendo ultraleggero, Mini 4K è autorizzato a volare nelle categorie A1 e A3. Gli operatori non devono sostenere alcun test.
            - listitem [ref=e779]: "4K in Ultra HD e stabilizzatore a 3 assi per riprese di qualità cinematografica - Cattura momenti straordinari con qualsiasi luce: albe, tramonti e scene notturne. Grazie allo stabilizzatore a 3 assi puoi ottenere riprese di qualità cinematografica."
            - listitem [ref=e780]: Resistenza a venti fino a ‌38 km/h (livello 5) - I motori brushless migliorano la potenza e consentono il decollo ad altitudini fino a 4.000 metri. Inoltre, la distanza di trasmissione raggiunge i 10 km. [2]
