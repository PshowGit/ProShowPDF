                      - generic [ref=e628]: Buon insieme
                      - generic [ref=e629]: Teleobiettivo e scatti macro sorprendentemente efficaci. Ho visto annunci sui social media di obiettivi clip-on che trasformano effettivamente il tuo telefono in una telecamera spia a lungo raggio. Sospettavo che gli annunci fossero irrealistici e per lo più clickbait. In realtà sono rimasto più colpito dalle prestazioni di questo piccolo kit di lenti di quanto pensassi possibile. Bisogna regolare un po' la posizione dell'obiettivo per ottenerlo perfettamente centrato e senza vignettatura, ma una volta posizionato e messo a fuoco, in realtà risaltava molto più lontano e più chiaramente di quanto mi aspettassi. Tuttavia, l'obiettivo a lungo raggio deve essere davvero stabile per ottenere un'immagine pulita, quindi è necessario un treppiede o un modo per montarlo o renderlo davvero stabile. Sono stato in grado di scattare una foto di una persona a circa 300 piedi di distanza e di identificarla facilmente, quando il miglior zoom del telefono era così lontano che a malapena si poteva dire che ci fosse una persona nella foto.
