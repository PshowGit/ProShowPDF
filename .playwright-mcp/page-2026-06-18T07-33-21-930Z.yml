                    - generic [ref=e453]: Obiettivo Telefoto Kentfaith per Smartphone - Trasforma il Tuo Telefono in una Macchina Fotografica
                    - generic [ref=e454]: Questo obiettivo zoom da 450 mm per iPhone trasforma il tuo smartphone in una potente macchina fotografica, liberandoti dalle limitazioni della fotografia mobile standard. Con una magnifica di 28x, puoi avvicinare scene lontane, catturando foto cristalline con profondità e dimensione, mentre sfoca magnificamente lo sfondo.
                - generic [ref=e456]:
                  - img
                  - generic [ref=e457]:
                    - generic [ref=e458]: Concentra l'Attenzione sui Distanziati
                    - generic [ref=e459]: La lente ottica multicodificata garantisce una trasmissione della luce superiore e ripristina fedelmente i colori originali. La sua magnifica di 28X ti consente di catturare immagini straordinarie di soggetti lontani senza distorsioni. Include soprattutto un treppiede per scatti stabili ad alta magnifica. Che tu stia fotografando la fauna selvatica, persone, paesaggi o eventi sportivi, ti permette di inquadrare le tue foto con precisione, portando gli elementi distanti in un focus nitido.
                - generic [ref=e461]:
                  - img
                  - generic [ref=e462]:
                    - generic [ref=e463]: Documenta i dettagli invisibili
                    - generic [ref=e464]: Focalizza a distanze molto ravvicinate e cattura scatti in primo piano vividi dei dettagli più piccoli, dalle vene delicate di una foglia ai motivi intricati sulle ali di una farfalla. Perfetto per gli amanti della natura e i fotografi attenti ai dettagli.
