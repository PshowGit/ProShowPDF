        - heading "Descrizione prodotto" [level=2] [ref=e1220]
        - paragraph [ref=e1222]:
          - generic [ref=e1223]:
            - text: "Panoramica:"
            - text: DJI Mini 4K è un'incredibile soluzione per catturare in 4K il tuo mondo dal cielo. Con un peso inferiore a 249 grammi, nella maggior parte dei Paesi non è richiesto alcun test.* Inoltre, è incredibilmente facile da usare, con un tempo di volo max di 31 minuti, una distanza di trasmissione max di 10 km, straordinarie riprese in 4K e molto altro ancora.
            - text: Note:.
            - text: "* Occorre attivare DJI Mini 4K nell'app DJI Fly: visita il sito web ufficiale per scaricare l'app DJI Fly pridell'utilizzo.."
            - text: "** Prima di ogni volo, informarsi su tutte le leggi e le regolamentazioni locali.."
            - text: "*** Dati acquisiti con un modello di produzione di DJI Mini 4K in un ambiente controllato. L’esperienza effettiva potrebbe variare a seconda dell'ambiente, del metodo di utilizzo e della versione del firmware."
            - text: "**** Tutti i video e le foto in questa pagina sono stati realizzati nel rigoroso rispetto di leggi e regolamentazioni locali."
            - text: 1. Peso standard dell’aeromobile (includendo la Batteria di volo intelligente, le eliche e una scheda microSD). Il peso reale del prodotto potrebbe variare a causa di leggere differenze nei materiali e fattori esterni. Esame e formazione non richiesti in alcuni Paesi o aree geografiche. Consultare sempre le leggi e le regolamentazioni locali prima dell’uso.
            - text: 2. Conforme a FCC e testato in un ambiente esterno privo di interferenze.
            - text: "3. L’autonomia di volo è stata misurata in un ambiente di prova controllato. Le condizioni specifiche del test sono le seguenti: volo in avanti a una velocità costante di 17 km/h in un ambiente di laboratorio privo di vento, in modalità foto (senza acquisizione di foto durante il volo) e dal 100% del livello della batteria fino allo 0%. ‌Nelle precedenti condizioni si può ottenere un'autonomia massima di 62 minuti sostituendo la batteria 1 volta o di 93 minuti sostituendo la batteria 2 volte."
