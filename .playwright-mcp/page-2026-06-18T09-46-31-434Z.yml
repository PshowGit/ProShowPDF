                      - generic [ref=e2594]:
                        - paragraph [ref=e2595]: È il mio primo DJI ( ho Autel nano+ e usato altri droni autel più grandi di un amico).
                        - paragraph [ref=e2596]: Preso più che altro per curiosità, sono rimasto abbastanza sorpreso della qualità costruttiva, pur essendo il più economico dei DJI.
                        - paragraph [ref=e2597]: In sostanza è un Mini2 SE ( versione "ridotta" del mitico Mini2) con la CPU che gestisce fino a 4K( la versione SE arriva a 2.7k come risoluzione video). La prova è che la etichetta nel vano batterie riporta mini2SE.
                        - paragraph [ref=e2598]: Si tratta quindi in effetti di un "riciclo" da parte di DJI, tuttavia riciclo molto intelligente.
                        - paragraph [ref=e2599]: Infatti è un mini 2 , tranne per il fatto che non sono disponibili le SDK e quindi non si possono usare app alternative che aggiungono funzioni,peccato.
                        - paragraph [ref=e2600]: "Dal punto di vista pratico il drone è ottimo: molto fluido e facile, vola benissimo. È adatto ai principianti in quanto \"vola da solo\"."
                        - paragraph [ref=e2601]: L'unica cosa, non essendo dotato di sensori ostacoli, bisogna fare attenzione , fare un po' di pratica e volare con buon senso ( questo sempre!)
                        - paragraph [ref=e2602]: "Quindi prima prendere bene dimestichezza, facendo esercizio in hovering, in tutte le posizioni: coda verso di sé, in avanti e sui 4 lati. È la base per imparare a volare e acquisire gli automatismi per gestire un oggetto volante in tutte le posizioni rispetto a se ."
                        - paragraph [ref=e2603]: "Il mini 4k è già classificato C0, quindi non serve patentino ma è OBBLIGATORIA la assicurazione e la registrazione a dflight ( che costa 6 euro). Inoltre prima di volare bisogna consultare le mappe appunto di di Flight, perché vi sono le zone rosse, in cui è vietato volare: tipicamente nei centri delle città, vicino ad aeroporti e eliporti, in molti parchi ecc. Attenzione perché violando le regole ci sono sanzioni piuttosto pesanti."
                        - paragraph [ref=e2604]: Tornando al drone,il comparto fotografico è ottimo ,scatta anche i. raw , e fa braketing. Il video è fino a 4k 30 FPS, di ottima qualità. Non registra in log( o cinelyke o simili) , ma essendo economico è comprensibile. Il fatto che sia un modello "base " si nota solo da una certa lentezza nel passaggio fra video e foto,( un secondo abbondante) e poi nella risposta degli stick, che nel volo pratico non da nessun problema, ma se si guarda il log , per i più tecnici, si trovano spesso risposte >0.5 secondi.. ma ripeto nel volo normale risulta tutto ok.
                        - paragraph [ref=e2605]: Per me ( ho una certa esperienza con cosi volanti😉)promosso a pieni voti!
