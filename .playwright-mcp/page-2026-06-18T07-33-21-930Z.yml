                  - generic [ref=e471]:
                    - generic [ref=e472]: Portatile e multiuso
                    - generic [ref=e473]: Con un design compatto e leggero, questo obiettivo zoom per iPhone è facile da imballare e trasportare, rendendolo il compagno perfetto per campeggio, eventi sportivi, osservazione della luna, bird watching, pesca, escursionismo, golf, concerti e viaggi. Può anche funzionare come telescopio monoculare, perfetto per avvistare la fauna selvatica e osservare paesaggi.
                - generic [ref=e475]:
