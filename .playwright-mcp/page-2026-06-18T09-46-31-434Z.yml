                      - generic [ref=e1378]:
                        - heading "Cerchio" [level=1] [ref=e1379]
                        - paragraph [ref=e1380]: La fotocamera di DJI Mini 4K si focalizza sul soggetto ed esegue un movimento circolare completo a un'altitudine costante. Il pilota può selezionare la rotazione in senso orario o antiorario. Circle crea riprese che catturano il soggetto da ogni angolazione nell'ambiente circostante, migliorandone la presenza visiva.
                      - generic [ref=e1388]:
                        - generic "Fai clic per riprodurre il video, Riprese aeree di un faro costiero. La telecamera si muove intorno alla struttura, mostrando il faro bianco con cupola verde situato all&#39;estremità di un lungo molo che si estende nel mare. Le onde si infrangono contro la costa rocciosa. La vista aerea rivela la posizione isolata del faro circondato dall&#39;acqua blu. Il video evidenzia le capacità di ripresa aerea e la qualità dell&#39;immagine del drone utilizzato per catturare queste suggestive vedute costiere."
