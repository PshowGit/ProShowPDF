                        - heading "Spirale" [level=1] [ref=e1345]
                        - paragraph [ref=e1346]: DJI Mini 4K sale di quota con un movimento a spirale che si espande gradualmente, continuando a inquadrare il soggetto. Il pilota può selezionare la spirale in senso orario o antiorario. La ripresa effettuata in modalità Spirale consente al pilota di creare immagini che esaltano l'interazione del soggetto con l'ambiente, e non si concentrano esclusivamente sul soggetto.
                      - generic [ref=e1354]:
                        - generic "Fai clic per riprodurre il video, Il video mostra una ripresa aerea di un paesaggio desertico roccioso. Un piccolo furgoncino blu e bianco, probabilmente un modello Volkswagen classico, attraversa lentamente il terreno sabbioso tra le rocce. La prospettiva si allarga gradualmente, rivelando sempre più dell&#39;ambiente circostante mentre il veicolo diventa sempre più piccolo nella scena. Il filmato sembra essere stato catturato da un drone, mostrando le capacità di ripresa aerea del prodotto."
