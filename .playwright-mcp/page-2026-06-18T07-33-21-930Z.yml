                    - generic [ref=e477]: Compatibile con il 99% degli Smart Phone
                    - list [ref=e479]:
                      - listitem [ref=e480]: Il nostro obiettivo telefoto mobile è dotato di un clip compatibile con il 99% degli smartphone sul mercato, come iPhone 15/15 Pro/15 Pro Max, iPhone 14/14 Pro/14 Pro Max, iPhone 13/13 Pro/13 Pro Max e altri; Samsung Galaxy e Note, Google Pixel, Huawei, OnePlus, ecc. Regalo perfetto per gli appassionati di fotografia macro.
                      - listitem [ref=e481]: "Come Utilizzare:"
                      - listitem [ref=e482]: 1. Installa il clip dell'obiettivo sul tuo telefono e regola il cursore per assicurarti che il foro sia allineato con la fotocamera principale del tuo telefono. (Copri ciascuna fotocamera a turno. Se l'immagine diventa nera, significa che quella coperta è la fotocamera principale.)
                      - listitem [ref=e483]: 2. Installa l'obiettivo telefoto sul tuo telefono.
                      - listitem [ref=e484]: 3. Installa il treppiede sul clip del telefono.
