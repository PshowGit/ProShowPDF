                        - heading "Panorama" [level=1] [ref=e1413]
                        - paragraph [ref=e1414]: "Seleziona tra le panoramiche Sfera, Grandangolo e 180°: DJI Mini 4K si occuperà di tutto il resto, generando quasi istantaneamente un capolavoro panoramico. I diversi effetti Panorama consentono di catturare immagini panoramiche classiche e altri quadri panoramici con effetto grandangolare o sferico, senza dover modificare le foto del post."
                      - generic [ref=e1422]:
                        - generic "Fai clic per riprodurre il video, Il video mostra l&#39;utilizzo di un drone DJI per riprendere il panorama di una grande città. Inizia con inquadrature ravvicinate del controller del drone e dello smartphone collegato che visualizza l&#39;immagine della fotocamera. Successivamente, il video passa a mostrare le riprese aeree della città, con grattacieli, edifici e strade visibili dall&#39;alto. La qualità dell&#39;immagine è nitida e stabile, evidenziando le capacità della fotocamera 4K e dello stabilizzatore del drone."
