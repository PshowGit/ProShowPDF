                    - generic [ref=e2660]:
                      - paragraph [ref=e2661]: Cercavo da tempo un drone compatto ma con una buona fotocamera, e quando ho trovato il DJI Mini 4K su Amazon a un prezzo davvero vantaggioso, non ho esitato un attimo. Da allora è diventato il mio “giocattolo” preferito — anche se definirlo così è riduttivo!
