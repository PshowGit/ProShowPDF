                        - paragraph [ref=e2894]: "📷 Qualità video eccellente:"
                        - paragraph [ref=e2895]: "La fotocamera 4K è una vera sorpresa: le riprese sono stabili, nitide e ben bilanciate nei colori. Anche in condizioni di luce non ideali, restituisce immagini di livello superiore rispetto a molti altri droni entry-level. Il gimbal a 3 assi lavora benissimo, garantendo fluidità cinematografica."
                        - paragraph
                        - paragraph [ref=e2896]: "🚁 Prestazioni di volo impeccabili:"
                        - paragraph [ref=e2897]: Stabile, reattivo e affidabile. Il Mini 4K mantiene la rotta anche con vento moderato e risponde con precisione ai comandi. I sensori lo rendono sicuro anche per chi è alle prime armi. Il GPS è rapido e preciso, e la modalità Return to Home funziona alla perfezione.
                        - paragraph
                        - paragraph [ref=e2898]: "🔋 Autonomia sorprendente:"
                        - paragraph [ref=e2899]: "La batteria dura circa 30 minuti reali in volo, più che sufficienti per sessioni di ripresa anche complesse. Ricarica rapida e facile da sostituire: ne ho acquistata una seconda per stare più tranquillo."
                        - paragraph
                        - paragraph [ref=e2900]: "📱 App intuitiva:"
                        - paragraph [ref=e2901]: L’app DJI Fly è semplice, ben fatta e adatta anche a chi non ha mai pilotato un drone. Le modalità automatiche (QuickShots) sono fantastiche per ottenere riprese professionali con un solo tocco.
                        - paragraph
                        - paragraph [ref=e2902]: "👜 Portabilità totale:"
                        - paragraph [ref=e2903]: Leggerissimo (meno di 250 g!) e pieghevole, entra in qualsiasi zaino. Questo lo rende perfetto per i viaggi o per riprese improvvisate.
