                      - generic [ref=e1361]:
                        - heading "Ascesa" [level=1] [ref=e1362]
                        - paragraph [ref=e1363]: La fotocamera di DJI Mini 4K si focalizza sul soggetto in basso mentre il velivolo sale rapidamente di quota. Indipendentemente dal fatto che il soggetto si trovi in uno spazio affollato o vuoto il video otterrà un senso di densità poiché la fotocamera mantiene il soggetto centrato e si sposta in verticale, racchiudendolo nell'ambiente circostante.
                      - generic [ref=e1371]:
                        - generic "Fai clic per riprodurre il video, Riprese aeree di un drone che mostrano una coppia che cammina su una formazione rocciosa in un paesaggio montuoso. La telecamera si allontana gradualmente, rivelando l&#39;imponente scogliera su cui si trovano e il paesaggio circostante. Il video evidenzia la capacità del drone di catturare viste panoramiche e seguire soggetti in movimento, mostrando la sua stabilità e qualità dell&#39;immagine in ambienti all&#39;aperto."
